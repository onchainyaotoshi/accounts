services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accounts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accounts_secret}
      POSTGRES_DB: ${POSTGRES_DB:-accounts_db}
    ports:
      - "127.0.0.1:${DB_PORT:-9997}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accounts}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "127.0.0.1:${API_PORT:-9998}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-accounts}:${POSTGRES_PASSWORD:-accounts_secret}@postgres:5432/${POSTGRES_DB:-accounts_db}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:9999}
      ISSUER_URL: ${ISSUER_URL:-http://localhost:9999}
      APP_DOMAIN: ${APP_DOMAIN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy --schema=prisma/schema.prisma &&
        node apps/api/dist/main
      "

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "127.0.0.1:${WEB_PORT:-9999}:7768"
    environment:
      INTERNAL_API_URL: http://api:3000
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-9998}
      NEXT_PUBLIC_APP_DOMAIN: ${APP_DOMAIN:-}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Accounts}
    depends_on:
      - api

volumes:
  postgres_data:
