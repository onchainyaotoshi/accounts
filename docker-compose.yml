services:
  postgres:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accounts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accounts_secret}
      POSTGRES_DB: ${POSTGRES_DB:-accounts_db}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accounts}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "127.0.0.1:7767:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-accounts}:${POSTGRES_PASSWORD:-accounts_secret}@postgres:5432/${POSTGRES_DB:-accounts_db}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:7768,http://localhost:7769}
      ISSUER_URL: ${ISSUER_URL:-http://localhost:7768}
      APP_DOMAIN: ${APP_DOMAIN:-}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy --schema=prisma/schema.prisma &&
        node apps/api/dist/main
      "

  web:
    restart: unless-stopped
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "127.0.0.1:7768:7768"
    environment:
      INTERNAL_API_URL: http://api:3000
      NEXT_PUBLIC_API_URL: http://localhost:7767
      NEXT_PUBLIC_APP_DOMAIN: ${APP_DOMAIN:-}
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-Accounts}
    depends_on:
      - api

  mailhog:
    restart: unless-stopped
    image: mailhog/mailhog:latest
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"

volumes:
  postgres_data:
