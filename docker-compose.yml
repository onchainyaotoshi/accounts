services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accounts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accounts_secret}
      POSTGRES_DB: ${POSTGRES_DB:-accounts_db}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-accounts}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "7767:3000"
    environment:
      DATABASE_URL: postgresql://accounts:accounts_secret@postgres:5432/accounts_db
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:7768,http://localhost:7769,https://accounts.yaotoshi.xyz}
      ISSUER_URL: ${ISSUER_URL:-http://localhost:7768}
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy --schema=prisma/schema.prisma &&
        node apps/api/dist/main
      "

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "7768:7768"
    environment:
      INTERNAL_API_URL: http://api:3000
      NEXT_PUBLIC_API_URL: http://localhost:7767
    depends_on:
      - api

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
