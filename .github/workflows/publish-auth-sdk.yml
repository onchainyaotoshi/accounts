name: Publish @yaotoshi/auth-sdk

on:
  push:
    paths:
      - 'packages/auth-sdk/**'
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check if version changed
        id: version-check
        working-directory: packages/auth-sdk
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          NPM_VERSION=$(npm view @yaotoshi/auth-sdk version 2>/dev/null || echo "0.0.0")
          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Publishing $PACKAGE_VERSION (npm has $NPM_VERSION)"
          fi

      - name: Build
        if: steps.version-check.outputs.skip == 'false'
        working-directory: packages/auth-sdk
        run: pnpm build

      - name: Publish
        if: steps.version-check.outputs.skip == 'false'
        working-directory: packages/auth-sdk
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
