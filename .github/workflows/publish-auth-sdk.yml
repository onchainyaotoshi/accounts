name: Publish @yaotoshi/auth-sdk

on:
  push:
    paths:
      - 'packages/auth-sdk/src/**'
      - 'packages/auth-sdk/package.json'
      - 'packages/auth-sdk/README.md'
      - 'packages/auth-sdk/tsup.config.ts'
      - 'packages/auth-sdk/tsconfig.json'
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump patch version
        working-directory: packages/auth-sdk
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Build
        working-directory: packages/auth-sdk
        run: pnpm build

      - name: Publish
        working-directory: packages/auth-sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump
        run: |
          git add packages/auth-sdk/package.json
          git commit -m "chore: bump @yaotoshi/auth-sdk to v$NEW_VERSION [skip ci]"
          git push
