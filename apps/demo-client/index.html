<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yaotoshi Auth Demo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; color: #1a1a1a; }
      h1 { margin-bottom: 24px; }
      button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; }
      #login-btn { background: #2563eb; color: white; }
      #login-btn:hover { background: #1d4ed8; }
      #logout-btn { background: #dc2626; color: white; margin-top: 16px; }
      #logout-btn:hover { background: #b91c1c; }
      #user-info { margin-top: 24px; padding: 16px; background: #f3f4f6; border-radius: 8px; display: none; }
      #user-info pre { white-space: pre-wrap; word-break: break-all; }
      #status { margin-top: 16px; color: #666; }
      #error { margin-top: 16px; color: #dc2626; display: none; }
    </style>
  </head>
  <body>
    <h1>Yaotoshi Auth Demo</h1>
    <div id="logged-out">
      <p>Click below to authenticate with your Yaotoshi account.</p>
      <button id="login-btn">Login with Yaotoshi</button>
    </div>
    <div id="logged-in" style="display: none;">
      <p>Authenticated successfully!</p>
      <div id="user-info"><pre id="user-data"></pre></div>
      <button id="logout-btn">Logout</button>
    </div>
    <div id="status"></div>
    <div id="error"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
